<!DOCTYPE html>
<html>
<head>
  <title>Mail verify</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a2a4f;
      color: white;
    }

    .box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>verify your mail</h2>
  <p>login with mail</p>
  <button onclick="connect()">continue</button>
</div>

<script>
async function connect() {
  const res = await fetch('/auth');
  const data = await res.json();
  window.location.href = data.url;
}
</script>

</body>
</html>
